version: "3.9"

services:
  # Shared cache for rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # AI engine running as an independent sidecar
  python_sidecar:
    build: ./python_backend
    ports:
      - "8000:8000"
    environment:
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - NODE_ORIGIN=http://localhost:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express Gateway
  node_gateway:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      python_sidecar:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PORT=3001
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - PYTHON_SIDECAR_URL=http://python_sidecar:8000
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - ALLOWED_ORIGINS=http://localhost:5173

  # React Frontend (Vite)
  frontend:
    build: .
    ports:
      - "5173:5173"
    depends_on:
      - node_gateway
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  mongodb_data:
